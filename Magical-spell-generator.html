<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Spell Generator</title>
    <style>
    body {
        font-family: 'Times New Roman', Times, serif;
        text-align: center;
        background-color: oklab(80.125% 0.11439 0.02147);
        padding: 30px;
    }

    h1 {color: purple;}

    #spellArea {
        width: 300px;
        height: 100px;
        margin: 20px auto;
        border:2px solid black;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        background-color: rgb(159, 124, 159);
        transition: background-color 0.5s;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
    }

    ul {
        list-style-type: none;
        padding: 0;
        gap: 15px;
    }

    li {
       margin: 5px;
       gap: 20px;
    }
</style>
</head>
<body>
    <h1>Welcome to the magical spell Generator</h1>

    <!-- Area where spells appear -->
     <div id="spellArea">
        Your spell will appear here.
     </div>

     <!-- Buttons -->
    <button id="generateButton">GenerateSpell</button>
    <button id="resetButton">Reset</button>

    <!-- Ingredients list -->
     <ul id="ingredientsList">
        <li>Dragon Scale</li>
        <li>Phoenix Feather</li>
        <li>Unicorn Horn</li>
     </ul>

    <script>
      const generateButton = document.getElementById("generateButton");
      const resetButton = document.getElementById("resetButton");
      const spellArea = document.getElementById("spellArea");
      const ingredients = document
        .getElementById("ingredientsList")
        .getElementsByTagName("li");
      const DEFAULT_TEXT = "Your spell will appear here...";
      const DEFAULT_COLOR = "lightpurple";

      generateButton.onclick = () => {
        generateButton.disabled = true;
        const selectedIngredient =
          ingredients[Math.floor(Math.random() * ingredients.length)]
            .textContent;
        spellArea.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 30%)`;
        let count = 3;
        spellArea.textContent = count;
        const timer = setInterval(() => {
          count--;
          if (count > 0) spellArea.textContent = count;
          else {
            clearInterval(timer);
            spellArea.textContent = ` Abraca dabra! ${selectedIngredient} `;
            generateButton.disabled = false;
                }
        }, 1000);
      };

      resetButton.onclick = () => {
        spellArea.textContent = DEFAULT_TEXT;
        spellArea.style.backgroundColor = DEFAULT_COLOR;
        generateButton.disabled = false;
      };
    </script>
</body>
</html>
